<svg xmlns="http://www.w3.org/2000/svg" width="232" height="120" viewBox="-16 0 232 120" fill="none">
  <defs>
    <clipPath id="csk-l"><circle cx="80" cy="60" r="44"/></clipPath>
    <clipPath id="ccz-l"><circle cx="120" cy="60" r="44"/></clipPath>
    <style>
      .v2-sk { animation: sk-in 3.6s ease-in-out infinite; }
      .v2-cz { animation: cz-in 3.6s ease-in-out infinite; }
      .v2-lbl { animation: lbl-fade 3.6s ease-in-out infinite; }
      .v2-pulse { transform-origin: 100px 60px; animation: pulse 3.6s ease-in-out infinite; }
      .v2-cs { animation: cs-show 3.6s ease-in-out infinite; }
      @keyframes sk-in  { 0%,100%{transform:translateX(-46px)} 30%,70%{transform:translateX(0)} }
      @keyframes cz-in  { 0%,100%{transform:translateX(46px)}  30%,70%{transform:translateX(0)} }
      @keyframes lbl-fade { 0%,25%{opacity:1} 40%,65%{opacity:0.2} 80%,100%{opacity:1} }
      @keyframes pulse  { 0%,26%{opacity:0;transform:scale(0.6)} 42%{opacity:0.65;transform:scale(1)} 56%,100%{opacity:0;transform:scale(1.7)} }
      @keyframes cs-show { 0%,28%{opacity:0} 44%,65%{opacity:1} 80%,100%{opacity:0} }
    </style>
  </defs>

  <!-- SK -->
  <g class="v2-sk">
    <circle cx="80" cy="60" r="44" fill="rgba(201,169,110,0.28)" stroke="#b8924a" stroke-width="1.5"/>
    <text class="v2-lbl" x="80" y="55" font-family="Cormorant Garamond,Georgia,serif" font-size="13" fill="#8a6830" letter-spacing="2" text-anchor="middle" font-weight="600">SK</text>
    <text class="v2-lbl" x="80" y="70" font-family="Inter,Arial,sans-serif" font-size="7" fill="rgba(138,104,48,0.6)" letter-spacing="1.5" text-anchor="middle">SLOVENSKO</text>
  </g>

  <!-- CZ -->
  <g class="v2-cz">
    <circle cx="120" cy="60" r="44" fill="rgba(139,34,82,0.16)" stroke="#8b2252" stroke-width="1.5"/>
    <text class="v2-lbl" x="120" y="55" font-family="Cormorant Garamond,Georgia,serif" font-size="13" fill="#8b2252" letter-spacing="2" text-anchor="middle" font-weight="600">CZ</text>
    <text class="v2-lbl" x="120" y="70" font-family="Inter,Arial,sans-serif" font-size="7" fill="rgba(139,34,82,0.55)" letter-spacing="1.5" text-anchor="middle">ČECHY</text>
  </g>

  <!-- Pulse ring -->
  <circle class="v2-pulse" cx="100" cy="60" r="24" fill="none" stroke="rgba(107,85,64,0.3)" stroke-width="1"/>

  <!-- ČS WIEN intersection -->
  <g class="v2-cs">
    <g clip-path="url(#ccz-l)">
      <circle cx="80" cy="60" r="44" fill="rgba(139,34,82,0.28)"/>
    </g>
    <text x="100" y="58" font-family="Cormorant Garamond,Georgia,serif" font-size="22" font-weight="600" fill="#1a1208" text-anchor="middle" letter-spacing="4">ČS</text>
    <text x="100" y="72" font-family="Inter,Arial,sans-serif" font-size="6" fill="rgba(26,18,8,0.55)" text-anchor="middle" letter-spacing="3">WIEN</text>
  </g>
</svg>
