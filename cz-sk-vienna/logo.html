<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ČS Dating — Logo Concepts</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d; color: #f0ece4;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 80px; padding: 80px 40px;
    }

    .logo-section {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .logo-label {
      font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(201,169,110,0.45);
    }
    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; letter-spacing: 5px; color: #f0ece4;
      text-transform: uppercase; margin-top: 4px;
    }
    .logo-fullname {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.82rem; letter-spacing: 2.5px; color: rgba(201,169,110,0.55);
      font-style: italic;
    }
    .divider {
      width: 1px; height: 50px; background: rgba(201,169,110,0.12);
    }

    /* ─── SHARED KEYFRAMES ─── */
    @keyframes sk-slide-in  { 0%,100%{transform:translateX(-48px)} 35%,65%{transform:translateX(0)} }
    @keyframes cz-slide-in  { 0%,100%{transform:translateX(48px)}  35%,65%{transform:translateX(0)} }
    @keyframes cs-appear    { 0%,28%{opacity:0} 44%,65%{opacity:1} 80%,100%{opacity:0} }
    @keyframes labels-fade  { 0%,25%{opacity:1} 42%,65%{opacity:0.25} 80%,100%{opacity:1} }
    @keyframes pulse-ring   { 0%,26%{opacity:0;transform:scale(0.6)} 42%{opacity:0.7;transform:scale(1)} 56%,100%{opacity:0;transform:scale(1.7)} }
    @keyframes orbit-in     {
      0%   { transform:rotate(-130deg) translateX(56px) rotate(130deg); opacity:0; }
      12%  { opacity:1; }
      42%,72% { transform:rotate(0deg) translateX(0) rotate(0deg); opacity:1; }
      92%  { opacity:0.3; }
      100% { transform:rotate(-130deg) translateX(56px) rotate(130deg); opacity:0; }
    }
    @keyframes sk-dim  { 0%,38%{opacity:0.45} 48%,72%{opacity:1} 90%,100%{opacity:0.45} }
    @keyframes orbit-text { 0%,44%{opacity:0} 56%,70%{opacity:1} 88%,100%{opacity:0} }


    /* ─────────────────────────────────────
       V1 — VENN UNION
       Two circles slide from sides → meet → ČS appears in overlap
    ───────────────────────────────────── */
    .v1-sk  { animation: sk-slide-in 3.4s cubic-bezier(.4,0,.2,1) infinite; }
    .v1-cz  { animation: cz-slide-in 3.4s cubic-bezier(.4,0,.2,1) infinite; }
    .v1-cs  { animation: cs-appear   3.4s cubic-bezier(.4,0,.2,1) infinite; }
    .v1-lbl { animation: labels-fade 3.4s cubic-bezier(.4,0,.2,1) infinite; }


    /* ─────────────────────────────────────
       V2 — PULSE UNION
       Same meet, but intersection sends a pulse ring outward
    ───────────────────────────────────── */
    .v2-sk    { animation: sk-slide-in  3.6s ease-in-out infinite; }
    .v2-cz    { animation: cz-slide-in  3.6s ease-in-out infinite; }
    .v2-cs    { animation: cs-appear    3.6s ease-in-out infinite; }
    .v2-lbl   { animation: labels-fade  3.6s ease-in-out infinite; }
    .v2-pulse { transform-origin: 100px 60px; animation: pulse-ring 3.6s ease-in-out infinite; }


    /* ─────────────────────────────────────
       V3 — ORBIT & LOCK
       CZ orbits in from top-right and locks with SK
    ───────────────────────────────────── */
    .v3-sk      { animation: sk-dim    4.2s ease-in-out infinite; }
    .v3-cz      { transform-origin: 82px 80px; animation: orbit-in 4.2s cubic-bezier(.34,1.4,.64,1) infinite; }
    .v3-cs      { animation: orbit-text 4.2s ease-in-out infinite; }
    .v3-lbl-sk  { animation: labels-fade 4.2s ease-in-out infinite; }


    /* ─── light bg preview wrapper ─── */
    .preview-light {
      background: #f8f4ee; padding: 40px 60px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .preview-light .logo-name    { color: #1a1208; }
    .preview-light .logo-fullname { color: rgba(139,34,82,0.55); }
  </style>
</head>
<body>

  <!-- ═══ V1 — VENN UNION ═══ -->
  <div class="logo-section">
    <div class="logo-label">V1 — Venn Union</div>

    <svg width="200" height="120" viewBox="0 0 200 120" fill="none">
      <defs>
        <clipPath id="csk1"><circle cx="80" cy="60" r="45"/></clipPath>
        <clipPath id="ccz1"><circle cx="120" cy="60" r="45"/></clipPath>
      </defs>

      <!-- SK circle -->
      <g class="v1-sk">
        <circle cx="80" cy="60" r="45" fill="rgba(201,169,110,0.10)" stroke="#c9a96e" stroke-width="1.8"/>
        <text class="v1-lbl" x="63" y="55" font-family="Cormorant Garamond,serif" font-size="13" fill="#c9a96e" letter-spacing="2" text-anchor="middle" font-weight="600">SK</text>
        <text class="v1-lbl" x="63" y="70" font-family="Inter,sans-serif" font-size="7" fill="rgba(201,169,110,0.5)" letter-spacing="1.5" text-anchor="middle">SLOVENSKO</text>
      </g>

      <!-- CZ circle -->
      <g class="v1-cz">
        <circle cx="120" cy="60" r="45" fill="rgba(139,34,82,0.10)" stroke="#8b2252" stroke-width="1.8"/>
        <text class="v1-lbl" x="137" y="55" font-family="Cormorant Garamond,serif" font-size="13" fill="#a8325f" letter-spacing="2" text-anchor="middle" font-weight="600">CZ</text>
        <text class="v1-lbl" x="137" y="70" font-family="Inter,sans-serif" font-size="7" fill="rgba(168,50,95,0.5)" letter-spacing="1.5" text-anchor="middle">ČECHY</text>
      </g>

      <!-- Intersection + ČS -->
      <g class="v1-cs">
        <g clip-path="url(#ccz1)">
          <circle cx="80" cy="60" r="45" fill="rgba(210,150,100,0.22)"/>
        </g>
        <text x="100" y="55" font-family="Cormorant Garamond,serif" font-size="20" font-weight="600" fill="#f0ece4" text-anchor="middle" letter-spacing="4">ČS</text>
        <text x="100" y="71" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(240,236,228,0.6)" text-anchor="middle" letter-spacing="2.5">SPOLOČNÉ</text>
      </g>
    </svg>

    <div class="logo-name">ČS DATING</div>
    <div class="logo-fullname">Česko-Slovenský Dating · Wien</div>
  </div>

  <div class="divider"></div>

  <!-- ═══ V2 — PULSE UNION ═══ -->
  <div class="logo-section">
    <div class="logo-label">V2 — Pulse Union</div>

    <svg width="200" height="120" viewBox="0 0 200 120" fill="none">
      <defs>
        <clipPath id="csk2"><circle cx="80" cy="60" r="44"/></clipPath>
        <clipPath id="ccz2"><circle cx="120" cy="60" r="44"/></clipPath>
      </defs>

      <g class="v2-sk">
        <circle cx="80" cy="60" r="44" fill="rgba(201,169,110,0.10)" stroke="#c9a96e" stroke-width="2"/>
        <text class="v2-lbl" x="80" y="55" font-family="Cormorant Garamond,serif" font-size="13" fill="#c9a96e" letter-spacing="2" text-anchor="middle" font-weight="600">SK</text>
        <text class="v2-lbl" x="80" y="70" font-family="Inter,sans-serif" font-size="7" fill="rgba(201,169,110,0.45)" letter-spacing="1.5" text-anchor="middle">SLOVENSKO</text>
      </g>

      <g class="v2-cz">
        <circle cx="120" cy="60" r="44" fill="rgba(139,34,82,0.10)" stroke="#8b2252" stroke-width="2"/>
        <text class="v2-lbl" x="120" y="55" font-family="Cormorant Garamond,serif" font-size="13" fill="#a8325f" letter-spacing="2" text-anchor="middle" font-weight="600">CZ</text>
        <text class="v2-lbl" x="120" y="70" font-family="Inter,sans-serif" font-size="7" fill="rgba(168,50,95,0.45)" letter-spacing="1.5" text-anchor="middle">ČECHY</text>
      </g>

      <!-- Pulse ring -->
      <circle class="v2-pulse" cx="100" cy="60" r="24" fill="none" stroke="rgba(240,236,228,0.35)" stroke-width="1"/>

      <g class="v2-cs">
        <g clip-path="url(#ccz2)">
          <circle cx="80" cy="60" r="44" fill="rgba(210,150,100,0.22)"/>
        </g>
        <text x="100" y="58" font-family="Cormorant Garamond,serif" font-size="22" font-weight="600" fill="#f0ece4" text-anchor="middle" letter-spacing="4">ČS</text>
        <text x="100" y="72" font-family="Inter,sans-serif" font-size="6" fill="rgba(240,236,228,0.45)" text-anchor="middle" letter-spacing="3">WIEN</text>
      </g>
    </svg>

    <div class="logo-name">ČS DATING</div>
    <div class="logo-fullname">Česko-Slovenský Dating · Wien</div>
  </div>

  <div class="divider"></div>

  <!-- ═══ V3 — ORBIT & LOCK ═══ -->
  <div class="logo-section">
    <div class="logo-label">V3 — Orbit & Lock</div>

    <svg width="200" height="160" viewBox="0 0 200 160" fill="none">
      <defs>
        <clipPath id="csk3"><circle cx="82" cy="80" r="46"/></clipPath>
        <clipPath id="ccz3"><circle cx="118" cy="80" r="46"/></clipPath>
      </defs>

      <!-- Faint orbit guide -->
      <ellipse cx="100" cy="80" rx="58" ry="58" stroke="rgba(201,169,110,0.06)" stroke-width="1" stroke-dasharray="3 5"/>

      <!-- SK stays, dims until CZ arrives -->
      <g class="v3-sk">
        <circle cx="82" cy="80" r="46" fill="rgba(201,169,110,0.10)" stroke="#c9a96e" stroke-width="1.8"/>
        <text class="v3-lbl-sk" x="70" y="76" font-family="Cormorant Garamond,serif" font-size="13" fill="#c9a96e" letter-spacing="2" text-anchor="middle" font-weight="600">SK</text>
        <text class="v3-lbl-sk" x="70" y="91" font-family="Inter,sans-serif" font-size="7" fill="rgba(201,169,110,0.45)" letter-spacing="1.5" text-anchor="middle">SLOVENSKO</text>
      </g>

      <!-- CZ orbits in -->
      <g class="v3-cz">
        <circle cx="118" cy="80" r="46" fill="rgba(139,34,82,0.10)" stroke="#8b2252" stroke-width="1.8"/>
        <text x="130" y="76" font-family="Cormorant Garamond,serif" font-size="13" fill="#a8325f" letter-spacing="2" text-anchor="middle" font-weight="600">CZ</text>
        <text x="130" y="91" font-family="Inter,sans-serif" font-size="7" fill="rgba(168,50,95,0.45)" letter-spacing="1.5" text-anchor="middle">ČECHY</text>
      </g>

      <!-- Intersection -->
      <g class="v3-cs">
        <g clip-path="url(#ccz3)">
          <circle cx="82" cy="80" r="46" fill="rgba(210,150,100,0.22)"/>
        </g>
        <text x="100" y="75" font-family="Cormorant Garamond,serif" font-size="20" font-weight="600" fill="#f0ece4" text-anchor="middle" letter-spacing="4">ČS</text>
        <text x="100" y="91" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(240,236,228,0.55)" text-anchor="middle" letter-spacing="2">SPOLOČNÝ ZÁKLAD</text>
      </g>
    </svg>

    <div class="logo-name">ČS DATING</div>
    <div class="logo-fullname">Česko-Slovenský Dating · Wien</div>
  </div>

  <div class="divider"></div>

  <!-- ═══ V1 LIGHT PREVIEW ═══ -->
  <div class="logo-section">
    <div class="logo-label">V1 — Light background</div>
    <div class="preview-light">
      <svg width="200" height="120" viewBox="0 0 200 120" fill="none">
        <defs>
          <clipPath id="csk4"><circle cx="80" cy="60" r="45"/></clipPath>
          <clipPath id="ccz4"><circle cx="120" cy="60" r="45"/></clipPath>
        </defs>
        <g style="animation:sk-slide-in 3.4s cubic-bezier(.4,0,.2,1) infinite">
          <circle cx="80" cy="60" r="45" fill="rgba(201,169,110,0.14)" stroke="#c9a96e" stroke-width="1.8"/>
          <text style="animation:labels-fade 3.4s cubic-bezier(.4,0,.2,1) infinite" x="63" y="55" font-family="Cormorant Garamond,serif" font-size="13" fill="#c9a96e" letter-spacing="2" text-anchor="middle" font-weight="600">SK</text>
          <text style="animation:labels-fade 3.4s cubic-bezier(.4,0,.2,1) infinite" x="63" y="70" font-family="Inter,sans-serif" font-size="7" fill="rgba(201,169,110,0.6)" letter-spacing="1.5" text-anchor="middle">SLOVENSKO</text>
        </g>
        <g style="animation:cz-slide-in 3.4s cubic-bezier(.4,0,.2,1) infinite">
          <circle cx="120" cy="60" r="45" fill="rgba(139,34,82,0.10)" stroke="#8b2252" stroke-width="1.8"/>
          <text style="animation:labels-fade 3.4s cubic-bezier(.4,0,.2,1) infinite" x="137" y="55" font-family="Cormorant Garamond,serif" font-size="13" fill="#8b2252" letter-spacing="2" text-anchor="middle" font-weight="600">CZ</text>
          <text style="animation:labels-fade 3.4s cubic-bezier(.4,0,.2,1) infinite" x="137" y="70" font-family="Inter,sans-serif" font-size="7" fill="rgba(139,34,82,0.5)" letter-spacing="1.5" text-anchor="middle">ČECHY</text>
        </g>
        <g style="animation:cs-appear 3.4s cubic-bezier(.4,0,.2,1) infinite">
          <g clip-path="url(#ccz4)">
            <circle cx="80" cy="60" r="45" fill="rgba(139,34,82,0.14)"/>
          </g>
          <text x="100" y="55" font-family="Cormorant Garamond,serif" font-size="20" font-weight="600" fill="#1a1208" text-anchor="middle" letter-spacing="4">ČS</text>
          <text x="100" y="71" font-family="Inter,sans-serif" font-size="6.5" fill="rgba(26,18,8,0.5)" text-anchor="middle" letter-spacing="2.5">SPOLOČNÉ</text>
        </g>
      </svg>
      <div class="logo-name">ČS DATING</div>
      <div class="logo-fullname">Česko-Slovenský Dating · Wien</div>
    </div>
  </div>

</body>
</html>
